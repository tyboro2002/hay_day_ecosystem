<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popcorn - Details</title>
    <style>
        body {
            background-color: #222222;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .card {
            background-color: #2d2d2d;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid #444444;
        }
        .item-image {
            width: 110px;
            height: 110px;
            margin-bottom: 15px;
            object-fit: contain;
            filter: drop-shadow(0px 6px 8px rgba(0,0,0,0.6));
        }
        h1 {
            margin: 5px 0 10px 0;
            font-size: 2rem;
            color: #f1a80a; /* Signature Gold Highlight */
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .price {
            font-size: 1.1rem;
            color: #b0b0b0;
            margin-bottom: 25px;
            font-weight: 500;
            background: #3a3a3a;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid #555555;
        }

        /* Financial Summary Panel Styles */
        .financial-summary {
            display: flex;
            justify-content: space-between;
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 30px;
            border: 1px solid #3a3a3a;
            gap: 10px;
        }
        .fin-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .fin-col:not(:last-child) {
            border-right: 1px solid #333333;
        }
        .fin-label {
            font-size: 0.72rem;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 5px;
        }
        .fin-val {
            font-size: 0.95rem;
            font-weight: 700;
        }
        .profit-positive .fin-val {
            color: #2ecc71; /* Emerald Green */
        }
        .profit-negative .fin-val {
            color: #e74c3c; /* Crimson Red */
        }
        .profit-neutral .fin-val {
            color: #b0b0b0; /* Flat Muted Silver */
        }

        .section-title {
            text-align: left;
            font-size: 0.95rem;
            color: #f1a80a;
            border-bottom: 2px solid #444444;
            padding-bottom: 6px;
            margin-top: 25px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
        }

        /* Interactive Grid Styles */
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: flex-start;
            margin-bottom: 30px;
        }
        .grid-item {
            background-color: #353535;
            border: 1px solid #484848;
            border-radius: 12px;
            width: 90px;
            padding: 15px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-sizing: border-box;
        }
        .grid-item:hover {
            transform: translateY(-5px) scale(1.03);
            background-color: #404040;
            border-color: #f1a80a;
            box-shadow: 0 5px 15px rgba(241, 168, 10, 0.2);
        }
        .grid-item img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            margin-bottom: 8px;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.4));
        }
        .grid-item .name {
            font-size: 0.72rem;
            text-align: center;
            font-weight: 600;
            line-height: 1.2;
            word-break: break-word;
            padding: 0 4px;
        }
        .grid-item .qty-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: #f1a80a;
            color: #222222;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 8px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
            border: 1.5px solid #2d2d2d;
        }
        .no-items {
            color: #888888;
            font-style: italic;
            text-align: center;
            width: 100%;
            padding: 25px 10px;
            background-color: #353535;
            border-radius: 8px;
            border: 1px dashed #484848;
            margin-bottom: 5px;
            box-sizing: border-box;
            font-size: 0.9rem;
        }

        .back-btn {
            display: inline-block;
            background-color: #f1a80a;
            color: #222222;
            text-decoration: none;
            padding: 12px 35px;
            border-radius: 30px;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(241, 168, 10, 0.3);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 15px;
        }
        .back-btn:hover {
            background-color: #ffc233;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(241, 168, 10, 0.5);
        }
        .back-btn:active {
            transform: translateY(0);
        }
        .sc-disclaimer-footer {
            position: fixed !important;
            bottom: 20px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            z-index: 999999 !important; /* Forces it above PyVis canvas container */
            background-color: rgba(33, 33, 33, 0.95) !important;
            border: 1px solid #444444 !important;
            border-radius: 30px !important;
            padding: 10px 24px !important;
            color: #b0b0b0 !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important;
            font-size: 0.72rem !important;
            text-align: center !important;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6) !important;
            max-width: 90% !important;
            width: max-content !important;
            pointer-events: auto !important; /* Ensures the hyperlink is clickable */
            backdrop-filter: blur(8px) !important;
            -webkit-backdrop-filter: blur(8px) !important;
        }
        .sc-disclaimer-footer a {
            color: #f1a80a !important;
            text-decoration: none !important;
            font-weight: 600 !important;
        }
        .sc-disclaimer-footer a:hover {
            text-decoration: underline !important;
        }
    </style>
</head>
